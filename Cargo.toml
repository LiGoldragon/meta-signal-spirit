[package]
name         = "meta-signal-spirit"
version      = "0.1.0"
edition      = "2024"
rust-version = "1.89"
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/LiGoldragon/meta-signal-spirit"
description  = "MetaSignal contract for privileged spirit lifecycle and policy."
publish      = false
links        = "meta-signal-spirit"
build        = "build.rs"

[lib]
name = "meta_signal_spirit"
path = "src/lib.rs"

[features]
default = []
nota-text = ["dep:nota-next", "signal-frame/nota-text", "signal-spirit/nota-text"]

[dependencies]
signal-frame  = { git = "https://github.com/LiGoldragon/signal-frame.git", branch = "main", default-features = false }
signal-spirit = { git = "https://github.com/LiGoldragon/signal-spirit.git", branch = "main", default-features = false }
nota-next     = { git = "https://github.com/LiGoldragon/nota-next.git", branch = "main", optional = true }
rkyv          = { version = "0.8", default-features = false, features = ["std", "bytecheck", "little_endian", "pointer_width_32", "unaligned"] }
thiserror     = "2"

[build-dependencies]
schema-rust-next = { git = "https://github.com/LiGoldragon/schema-rust-next.git", branch = "main" }

[dev-dependencies]
nota-next = { git = "https://github.com/LiGoldragon/nota-next.git", branch = "main" }

[lints.rust]
unsafe_code = "forbid"
unused      = { level = "warn", priority = -1 }
dead_code   = "warn"
