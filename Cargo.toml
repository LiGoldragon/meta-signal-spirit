[package]
name         = "meta-signal-spirit"
version      = "0.6.0"
edition      = "2024"
rust-version = "1.89"
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/LiGoldragon/meta-signal-spirit"
description  = "MetaSignal contract for privileged spirit lifecycle and policy."
publish      = false
links        = "meta-signal-spirit"
build        = "build.rs"

[lib]
name = "meta_signal_spirit"
path = "src/lib.rs"

[features]
default = []
nota-text = ["dep:nota", "signal-frame/nota-text", "signal-spirit/nota-text"]

[dependencies]
signal-frame  = { git = "https://github.com/LiGoldragon/signal-frame.git", branch = "main", default-features = false }
signal-spirit = { git = "https://github.com/LiGoldragon/signal-spirit.git", rev = "c8dd7320458ebc0a29f158e7542f143a986cd536", default-features = false }
nota     = { package = "nota", git = "https://github.com/LiGoldragon/nota.git", branch = "main", optional = true }
rkyv          = { version = "0.8", default-features = false, features = ["std", "bytecheck", "little_endian", "pointer_width_32", "unaligned"] }
thiserror     = "2"

[build-dependencies]
schema-rust = { package = "schema-rust", git = "https://github.com/LiGoldragon/schema-rust.git", rev = "31aad1dc494c24a4390234842f15a93afe666dee" }

[dev-dependencies]
nota = { package = "nota", git = "https://github.com/LiGoldragon/nota.git", branch = "main" }

[lints.rust]
unsafe_code = "forbid"
unused      = { level = "warn", priority = -1 }
dead_code   = "warn"
